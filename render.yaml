services:
  - type: web
    name: video-processor
    env: docker
    plan: starter
    healthCheckPath: /api/stats
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: RENDER
        value: 'true'
      - key: REDIS_URL
        fromService:
          type: redis
          name: video-processor-redis
          property: connectionString

  - type: redis
    name: video-processor-redis
    plan: free
